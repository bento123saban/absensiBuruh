<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Web Push Notif</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
            color: #333;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        h1 {
            color: #424242;
        }
        button {
            background-color: #4285F4;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 10px 0;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #357ae8;
        }
        #tokenDisplay {
            margin-top: 20px;
            padding: 10px;
            background-color: #e8f0fe;
            border-left: 5px solid #4285F4;
            text-align: left;
            word-break: break-all;
        }
        #tokenDisplay strong {
            display: block;
            margin-bottom: 5px;
        }
        #messageDisplay {
            margin-top: 20px;
            padding: 10px;
            background-color: #ffe0b2; /* Light orange */
            border-left: 5px solid #fb8c00; /* Darker orange */
            text-align: left;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Firebase Web Push Notif App</h1>
        <p>Aktifkan notifikasi untuk menerima pesan push dari Firebase.</p>
        <button id="requestPermissionBtn">Aktifkan Notifikasi</button>
        <div id="tokenDisplay" style="display:none;">
            <strong>FCM Registration Token:</strong>
            <span id="fcmToken"></span>
            <button onclick="copyToken()">Salin Token</button>
        </div>
        <div id="messageDisplay" style="display:none;">
            <strong>Pesan Diterima (Foreground):</strong>
            <pre id="receivedMessage"></pre>
        </div>
        <p>Buka konsol browser untuk melihat log detail.</p>
    </div>

    <!-- Firebase SDKs - gunakan versi modular terbaru dari CDN -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging.js";
        import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-functions.js";

        // TODO: Ganti dengan firebaseConfig dari proyek fcm-push-notif-50a72 kamu!
        // Kamu bisa mendapatkannya dari Firebase Console > Project settings > General > Your apps (Web app)
        const firebaseConfig = {
            apiKey: "AIzaSyBhCRZ_OHqCRC7XUrgBUBQSPhMKovQr63o",
            authDomain: "fcm-push-notif-50a72.firebaseapp.com",
            projectId: "fcm-push-notif-50a72",
            storageBucket: "fcm-push-notif-50a72.firebasestorage.app",
            messagingSenderId: "119993278445",
            appId: "1:119993278445:web:bcdb4b7eb31db635de51e4",
            measurementId: "G-WHDCR50XE1"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const messaging = getMessaging(app);
        const functions = getFunctions(app); // Untuk memanggil Cloud Function

        // VAPID Key kamu dari Firebase Console > Project settings > Cloud Messaging > Web configuration > Generate key pair
        const VAPID_KEY = "YOUR_VAPID_KEY_FROM_FIREBASE_CONSOLE";

        // Fungsi untuk mendaftarkan Service Worker dan meminta izin
        async function setupNotifications() {
            if ('serviceWorker' in navigator) {
                try {
                    const registration = await navigator.serviceWorker.register('/firebase-messaging-sw.js');
                    console.log('Service Worker Registered:', registration);

                    const permission = await Notification.requestPermission();
                    if (permission === 'granted') {
                        console.log('Notification permission granted.');
                        const currentToken = await getToken(messaging, { vapidKey: VAPID_KEY });
                        if (currentToken) {
                            console.log('FCM Registration Token:', currentToken);
                            document.getElementById('fcmToken').textContent = currentToken;
                            document.getElementById('tokenDisplay').style.display = 'block';
                            // TODO: Kirim token ini ke server backend kamu (misal: ke Cloud Function) untuk disimpan
                            // Contoh: saveTokenToDatabase({ token: currentToken });
                        } else {
                            console.warn('No registration token available. Request permission to generate one.');
                            document.getElementById('fcmToken').textContent = 'Tidak ada token tersedia.';
                        }
                    } else {
                        console.warn('Unable to get permission to notify.');
                        document.getElementById('fcmToken').textContent = 'Izin notifikasi ditolak.';
                    }
                } catch (error) {
                    console.error('Service Worker registration or token retrieval failed:', error);
                    document.getElementById('fcmToken').textContent = 'Error saat inisialisasi notifikasi.';
                }
            } else {
                console.warn('Browser tidak mendukung Service Workers.');
                document.getElementById('fcmToken').textContent = 'Browser tidak mendukung Service Workers.';
            }
        }

        // Event listener untuk tombol
        document.getElementById('requestPermissionBtn').addEventListener('click', setupNotifications);

        // Tangani pesan saat aplikasi di foreground
        onMessage(messaging, (payload) => {
            console.log('Message received while app is in foreground:', payload);
            document.getElementById('messageDisplay').style.display = 'block';
            document.getElementById('receivedMessage').textContent = JSON.stringify(payload, null, 2);

            // Jika kamu ingin menampilkan notifikasi di foreground, kamu bisa membuatnya secara manual
            // const notificationTitle = payload.notification.title || 'Pesan Baru';
            // const notificationOptions = {
            //     body: payload.notification.body || 'Anda punya pesan baru!',
            //     icon: payload.notification.icon || '/firebase-logo.png' // Pastikan ikon ini ada
            // };
            // new Notification(notificationTitle, notificationOptions);
        });

        // Fungsi untuk menyalin token
        function copyToken() {
            const token = document.getElementById('fcmToken').textContent;
            navigator.clipboard.writeText(token).then(() => {
                alert('Token FCM berhasil disalin!');
            }).catch(err => {
                console.error('Gagal menyalin token:', err);
                alert('Gagal menyalin token. Silakan salin manual.');
            });
        }
        window.copyToken = copyToken; // Membuat fungsi dapat diakses secara global

    </script>
</body>
</html>
